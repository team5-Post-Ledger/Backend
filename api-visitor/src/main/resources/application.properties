spring.application.name=api-visitor

spring.datasource.url=jdbc:mysql://${DB_ADDRESS}/${DB_NAME}?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

spring.flyway.enabled=false

server.port=${SERVER_PORT}

jwt.secret=fairpilot-secret-key-must-be-at-least-32-characters-long!!
jwt.expiration-ms=86400000
oauth.google.client-id=${GOOGLE_CLIENT_ID:dummy-client-id}